name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          # Also set in tests/conftest.py; CI env is a belt-and-suspenders safeguard
          APP_SECRET: ci-pytest-app-secret-not-for-production
          DATA_DIR: ${{ runner.temp }}/toefl-review-test-data
        run: |
          mkdir -p "$DATA_DIR"
          python -m pytest -q
