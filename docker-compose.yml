services:
  app:
    build: .
    container_name: toefl-review-app
    restart: unless-stopped
    env_file:
      - ./secrets/app.env
    environment:
      DATA_DIR: /app/data
    ports:
      - "127.0.0.1:3219:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
